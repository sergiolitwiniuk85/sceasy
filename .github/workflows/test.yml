# .github/workflows/test.yml
name: R CMD Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        seurat-version: [4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
      - name: Install dependencies
        run: |
          install.packages(c("testthat", "Matrix", "reticulate"))
          if ("${{ matrix.seurat-version }}" == "4") {
            install.packages("Seurat", repos = "https://cloud.r-project.org")
          } else {
            install.packages("Seurat", repos = "https://cloud.r-project.org")
          }
        shell: Rscript {0}
      - name: Install sceasy
        run: R CMD INSTALL .
      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary")'